# ─────────────────────────────────────────────────────────────────
# Pilgrim — Local Development Stack
# Usage: docker compose -f docker-compose.dev.yml up -d --build
# ─────────────────────────────────────────────────────────────────

services:
  # ── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pilgrim
      POSTGRES_PASSWORD: pilgrim
      POSTGRES_DB: pilgrim
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pilgrim"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── API (FastAPI + hot reload) ───────────────────────────────
  api:
    build:
      context: ./backend
      target: api
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    env_file: .env
    volumes:
      - ./backend/app:/app/app
      - ./backend/migrations:/app/migrations
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  # ── Celery Worker ────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      target: worker
    env_file: .env
    volumes:
      - ./backend/app:/app/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G

  # ── Celery Beat ──────────────────────────────────────────────
  beat:
    build:
      context: ./backend
      target: worker
    command: ["celery", "-A", "app.workers.celery_app", "beat", "-l", "info"]
    env_file: .env
    volumes:
      - ./backend/app:/app/app
    depends_on:
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
